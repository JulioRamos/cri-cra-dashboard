<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Dashboard CRI/CRA - Análise de títulos de renda fixa securitizados com dados ANBIMA"
    />
    <title>Dashboard CRI/CRA | ANBIMA</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --surface-0: #f9f8f7;
        --surface-1: #f0eeeb;
        --surface-2: #ffffff;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --text-muted: #999999;
        --text-accent: #2563eb;
        --border: rgba(0, 0, 0, 0.08);
        --bg-accent: #dbeafe;
        --bg-success: #dcfce7;
        --text-success: #15803d;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --surface-0: #1a1a1a;
          --surface-1: #2c2c2c;
          --surface-2: #1f1f1f;
          --text-primary: #ffffff;
          --text-secondary: #b3b3b3;
          --text-muted: #808080;
          --text-accent: #60a5fa;
          --border: rgba(255, 255, 255, 0.10);
          --bg-accent: #1e3a8a;
          --bg-success: #064e3b;
          --text-success: #86efac;
        }
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--surface-0);
        color: var(--text-primary);
      }

      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
    </style>
  </head>
  <body>
    <noscript>Você precisa habilitar JavaScript para executar este aplicativo.</noscript>
    <div id="root"></div>
  </body>
</html>
